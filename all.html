<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>All Races — WoW Model Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a1a;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #e0d8c8;
      overflow: hidden;
      height: 100vh;
    }

    /* --- Top bar --- */
    #controls {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 44px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 12px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.6);
      border-bottom: 1px solid rgba(200, 180, 120, 0.2);
    }
    #controls h1 {
      font-size: 14px;
      font-weight: 600;
      color: rgba(200, 180, 120, 0.9);
      letter-spacing: 0.06em;
      margin-right: 4px;
    }
    .toggle-group {
      display: flex;
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid rgba(200, 180, 120, 0.35);
    }
    .toggle-btn {
      background: rgba(0, 0, 0, 0.5);
      color: #e0d8c8;
      border: none;
      padding: 5px 16px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.04em;
    }
    .toggle-btn:not(:last-child) {
      border-right: 1px solid rgba(200, 180, 120, 0.25);
    }
    .toggle-btn.active {
      background: rgba(200, 180, 120, 0.2);
      color: rgba(200, 180, 120, 1);
      font-weight: 600;
    }
    .toggle-btn:hover:not(.active) {
      background: rgba(200, 180, 120, 0.08);
    }
    #controls select {
      background: rgba(0, 0, 0, 0.7);
      color: #e0d8c8;
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 5px 8px;
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 12px;
      border-radius: 4px;
      cursor: pointer;
      outline: none;
    }
    #controls select:hover { border-color: rgba(255, 255, 255, 0.4); }
    #controls select:focus { border-color: rgba(200, 180, 120, 0.6); }

    /* --- Canvas area (right of equipment panel, below topbar) --- */
    #canvas-wrap {
      position: absolute;
      top: 44px;
      left: 0;
      right: 0;
      bottom: 0;
    }
    #canvas { display: block; }
    #labels {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      z-index: 5;
    }
    .race-label {
      position: absolute;
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      color: rgba(200, 180, 120, 0.85);
      letter-spacing: 0.04em;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    }

    /* --- Equipment panel --- */
    #equipment-panel {
      position: absolute;
      top: 50px;
      right: 12px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.82);
      border: 1px solid rgba(200, 180, 120, 0.25);
      border-radius: 6px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 260px;
      font-family: 'Segoe UI', Arial, sans-serif;
      max-height: calc(100vh - 70px);
      overflow-y: auto;
    }
    .equip-title {
      color: rgba(200, 180, 120, 0.9);
      font-size: 12px;
      text-align: center;
      letter-spacing: 0.08em;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .equip-row { display: flex; flex-direction: column; gap: 3px; }
    .equip-row-header { display: flex; align-items: center; justify-content: space-between; }
    .equip-label {
      color: rgba(200, 180, 120, 0.85);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .equip-select-wrap { display: flex; flex-direction: column; gap: 3px; }
    .equip-search {
      background: rgba(0, 0, 0, 0.5);
      color: #e0d8c8;
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 4px 6px;
      font-size: 11px;
      font-family: 'Segoe UI', Arial, sans-serif;
      border-radius: 3px;
      outline: none;
      width: 100%;
      box-sizing: border-box;
    }
    .equip-search::placeholder { color: rgba(255, 255, 255, 0.3); }
    .equip-search:focus { border-color: rgba(200, 180, 120, 0.5); }
    .equip-row select {
      background: rgba(0, 0, 0, 0.6);
      color: #e0d8c8;
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 2px 4px;
      font-size: 11px;
      font-family: 'Segoe UI', Arial, sans-serif;
      border-radius: 3px;
      cursor: pointer;
      outline: none;
      width: 100%;
      box-sizing: border-box;
    }
    .equip-row select option { background: #1a1a1a; padding: 2px 4px; }
    .equip-row select:focus { border-color: rgba(200, 180, 120, 0.5); }
    .equip-dice {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 3px;
      color: #e0d8c8;
      font-size: 12px;
      cursor: pointer;
      padding: 1px 4px;
      line-height: 1;
      flex-shrink: 0;
    }
    .equip-dice:hover { background: rgba(255, 255, 255, 0.18); }
    #equip-randomize-all {
      margin-top: 2px;
      background: rgba(200, 180, 120, 0.12);
      border: 1px solid rgba(200, 180, 120, 0.35);
      border-radius: 4px;
      color: rgba(200, 180, 120, 0.9);
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 12px;
      cursor: pointer;
      padding: 5px 0;
    }
    #equip-randomize-all:hover { background: rgba(200, 180, 120, 0.25); }

    /* Hidden selects for equipmentUI compatibility */
    .hidden-compat { display: none; }
  </style>
</head>
<body>
  <div id="controls">
    <h1>ALL RACES</h1>
    <div class="toggle-group">
      <button class="toggle-btn active" data-gender="male">Male</button>
      <button class="toggle-btn" data-gender="female">Female</button>
    </div>
    <select id="anim-select"></select>
  </div>

  <!-- Hidden selects for equipmentUI.ts getCurrentModelSlug() compatibility -->
  <select id="race-select" class="hidden-compat">
    <option value="human" selected>Human</option>
  </select>
  <select id="gender-select" class="hidden-compat">
    <option value="male">Male</option>
    <option value="female">Female</option>
  </select>

  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
    <div id="labels"></div>
  </div>
  <div id="equipment-panel"></div>
  <script type="module" src="/src/all.ts"></script>
</body>
</html>
